<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>guessit-js API Documentation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.18.2/swagger-ui.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-themes@1/themes/dark.css">
  <style>
    .swagger-ui .topbar { display: none; }
    .swagger-ui { max-width: 1100px; margin: 0 auto; padding: 0 16px 40px; }
    .info-banner {
      background: #1a1a2a; color: #cbd5e1; padding: 10px 20px; text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px;
      border-bottom: 1px solid #333;
    }
    .info-banner a { color: #93c5fd; text-decoration: none; }
    .info-banner a:hover { text-decoration: underline; }
    .info-banner strong { color: #fff; }
  </style>
</head>
<body>
  <div class="info-banner">
    <strong>guessit-js</strong> v3.9.0 API Reference &mdash;
    <a href="../">Homepage</a> |
    <a href="https://github.com/opensubtitles/guessit-js">GitHub</a> |
    <a href="https://www.npmjs.com/package/guessit-js">npm</a>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.18.2/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: '../openapi.json',
      dom_id: '#swagger-ui',
      deepLinking: true,
      defaultModelsExpandDepth: 2,
      defaultModelExpandDepth: 2,
      docExpansion: 'list',
    });
  </script>
</body>
</html>
